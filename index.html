<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ミニ株で狙える株主優待（楽天証券導線）</title>
  <meta name="description" content="10万円未満の少額優待 / 1株（端株）優待。探す→詳細→楽天証券導線。絞り込みは収納。" />
  <style>
    :root{
      --bg:#f6f7f9; --card:#fff; --line:#e5e7eb; --text:#111; --muted:#6b7280;
      --shadow:0 1px 0 rgba(0,0,0,.03); --r:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;
      padding-bottom:58px; /* 下固定バー分 */
    }
    a{color:inherit}
    .wrap{max-width:980px;margin:0 auto;padding:14px 14px}
    header{
      background:var(--card);
      border-bottom:1px solid var(--line);
      position:sticky;top:0;z-index:10;
    }
    .topRow{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .titleBox b{display:block;font-size:16px}
    .titleBox .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .note{font-size:12px;color:var(--muted);margin-top:6px}
    .tabs{display:flex;gap:10px;margin-top:12px}
    .tab{
      flex:1;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:12px 10px;
      font-weight:900;
      cursor:pointer;
    }
    .tab.active{background:#111;color:#fff;border-color:#111}
    .searchRow{display:flex;gap:10px;align-items:center;margin-top:12px}
    input{
      width:100%;
      padding:12px 12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
    }
    .btn{
      padding:12px 12px;border-radius:14px;border:1px solid var(--line);
      background:#fff;cursor:pointer;white-space:nowrap;
      font-weight:800;
    }
    .btn.primary{background:#111;color:#fff;border-color:#111}
    .metaRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--muted)}
    .pill{display:inline-flex;gap:6px;align-items:center;background:#eef2ff;border-radius:999px;padding:3px 10px}
    .pill b{color:#111}

    /* 絞り込み（収納） */
    details.filters{
      margin-top:10px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:10px;
    }
    .sr-only{
      position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
    }
    .filterGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media (max-width:620px){ .filterGrid{grid-template-columns:1fr} }
    select{
      width:100%;
      padding:12px 12px;border:1px solid var(--line);border-radius:14px;background:#fff;
    }
    .filterActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}

    /* リスト（サイゼ式：縦、情報3行固定） */
    .listBox{
      background:#fff;border:1px solid var(--line);border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    details.item{border-bottom:1px solid var(--line)}
    details.item:last-child{border-bottom:none}
    summary{
      list-style:none;
      cursor:pointer;
      padding:14px 14px;
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px;
      align-items:center;
    }
    summary::-webkit-details-marker{display:none}
    .lines{min-width:0}
    .l1{font-weight:900}
    .l2{margin-top:6px;font-size:12px;color:var(--muted)}
    .need{font-size:20px;font-weight:950;color:#111}
    .l3{margin-top:6px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .arrow{
      font-weight:900;color:#111;
      border:1px solid var(--line);
      width:34px;height:34px;border-radius:999px;
      display:flex;align-items:center;justify-content:center;
      background:#fff;
      user-select:none;
    }
    details[open] .arrow{transform:rotate(90deg)}
    .detail{
      padding:0 14px 14px 14px;
    }
    .detail .row{display:flex;gap:10px;flex-wrap:wrap}
    .chip{
      display:inline-flex;align-items:center;gap:6px;
      border:1px solid var(--line);border-radius:999px;padding:3px 10px;font-size:12px;background:#fff;color:#111
    }
    .detail .small{margin-top:10px;font-size:12px;color:var(--muted);line-height:1.6}
    .ctaRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .cta{
      display:inline-block;
      padding:12px 14px;border-radius:14px;
      background:#111;color:#fff;text-decoration:none;font-weight:900;
    }
    .cta.ghost{background:#fff;color:#111;border:1px solid #111}
    .empty{
      padding:14px;color:var(--muted);font-size:12px;
    }
    .err{
      margin:12px 0;
      border:1px solid #fecaca;background:#fff1f2;color:#7f1d1d;
      border-radius:14px;padding:12px 12px;font-size:12px;
    }

    /* 免責など折りたたみ */
    details.legal{
      margin-top:14px;
      border:1px solid var(--line);
      border-radius:14px;background:#fff;padding:10px;
      color:var(--muted);font-size:12px;line-height:1.7;
    }
    details.legal summary{padding:6px 6px;font-weight:900;color:#111}

    /* 下固定バー（資金導線はここに移動） */
    .bottomBar{
      position:fixed;left:0;right:0;bottom:0;z-index:30;
      background:#fff;border-top:1px solid var(--line);
      padding:6px 10px;
    }
    .bottomInner{max-width:980px;margin:0 auto;display:flex;gap:10px}
    .bottomInner a{
      flex:1;text-align:center;text-decoration:none;
      padding:10px 10px;border-radius:14px;font-weight:950;
      border:1px solid var(--line);background:#fff;
    }
    .bottomInner a.primary{background:#111;color:#fff;border-color:#111}
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <div class="topRow">
      <div class="titleBox">
        <b>ミニ株で狙える株主優待</b>
        <div class="sub">まずは「10万円未満」か「1株」から選ぶだけ</div>
      </div>
      <button id="filterBtn" class="btn">絞り込み</button>
    </div>
    <div class="note">※プロモーション（広告）を含みます</div>

    <div class="tabs">
  <button id="tabMonth" class="tab active">今月の優待</button>
  <button id="tabUnder" class="tab">10万円未満</button>
  <button id="tabOne" class="tab">1株優待</button>
</div>
    </div>

    <div class="searchRow">
      <input id="q" placeholder="会社名・銘柄コードで検索（任意）" />
    </div>

    <details id="filters" class="filters" style="display:none;">
      <summary class="sr-only">絞り込み</summary>

      <div class="filterGrid">
        <div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">権利月</div>
          <select id="month">
            <option value="">すべて</option>
            <option>1月</option><option>2月</option><option>3月</option><option>4月</option><option>5月</option><option>6月</option>
            <option>7月</option><option>8月</option><option>9月</option><option>10月</option><option>11月</option><option>12月</option>
          </select>
        </div>

        <div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">カテゴリ</div>
          <select id="cat">
            <option value="">すべて</option>
          </select>
        </div>

        <div style="grid-column:1/-1;">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">並び替え</div>
          <select id="sort">
            <option value="needAsc">必要資金が少ない順（おすすめ）</option>
            <option value="yieldDesc">優待利回り（目安）が高い順</option>
            <option value="monthAsc">権利月順</option>
          </select>
        </div>
      </div>

      <div class="filterActions">
        <button id="reset" class="btn">リセット</button>
        <button id="closeFilters" class="btn primary">閉じる</button>
      </div>
    </details>

    <div id="meta" class="metaRow"></div>
    <div id="err" class="err" style="display:none;"></div>
  </div>
</header>

<div class="wrap">
  <div class="listBox" id="listBox">
    <div id="list"></div>
  </div>

  <details class="legal">
    <summary>免責・広告について</summary>
    <div style="padding:6px 6px 10px 6px;">
      <div>・本サイトは情報提供のみ（投資助言ではありません）。</div>
      <div>・優待内容、必要株数、条件、価格は変更/変動します。必ず出典（IR/TDnet/公式）で最終確認してください。</div>
      <div>・当ページはプロモーション（広告）を含み、リンク経由で成果が発生すると報酬を得る場合があります。</div>
    </div>
  </details>
</div>

<!-- 下固定バー -->
<div class="bottomBar">
  <div class="bottomInner">
    <a class="primary" href="./index.html">優待を探す</a>
    <a href="./money.html">資金を作る（固定費）</a>
  </div>
</div>

<script>
(() => {
  // ====== ここだけ本物に差し替え ======
  const RAKUTEN_AFF = "https://YOUR-RAKUTEN-AFF-LINK";
  // =====================================

  const DATA_URL = new URL("data.json", location.href).toString();

  const elErr = document.getElementById("err");
  const elMeta = document.getElementById("meta");
  const elList = document.getElementById("list");
  const elCat = document.getElementById("cat");

  const monthOrder = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

  let DATA = [];
  let tab = "under"; // "under" or "one"

  const state = {
    q: "",
    month: "",
    cat: "",
    sort: "needAsc"
  };

  const yen = (n) => (Number(n || 0)).toLocaleString("ja-JP") + "円";

  const escapeHTML = (s) => String(s ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");

  const yieldPct = (perkValueYen, needMoneyYen) => {
    const v = Number(perkValueYen || 0);
    const n = Number(needMoneyYen || 0);
    if (!v || !n) return 0;
    return (v / n) * 100;
  };

  const baseSet = () => {
    if (tab === "one") {
      return DATA.filter(x => Number(x.minSharesForPerk) === 1);
    }
    // under10万円（※1株は除外して “少額＝単元優待” を見せる想定）
    return DATA.filter(x => Number(x.minSharesForPerk) >= 100 && Number(x.needMoneyPerkYen) <= 100000);
  };

  const rebuildCatOptions = () => {
    const cats = [...new Set(baseSet().map(x => x.category).filter(Boolean))].sort();
    const current = state.cat;
    elCat.innerHTML = `<option value="">すべて</option>` + cats.map(c => `<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`).join("");
    if (current && cats.includes(current)) {
      elCat.value = current;
    } else {
      state.cat = "";
      elCat.value = "";
    }
  };

  const filtered = () => {
    const q = state.q.trim().toLowerCase();
    return baseSet()
      .filter(x => {
        const hitQ = !q || String(x.code).includes(q) || String(x.name || "").toLowerCase().includes(q);
        const hitM = !state.month || x.recordMonth === state.month;
        const hitC = !state.cat || x.category === state.cat;
        return hitQ && hitM && hitC;
      })
      .sort((a,b) => {
        if (state.sort === "needAsc") return Number(a.needMoneyPerkYen) - Number(b.needMoneyPerkYen);
        if (state.sort === "yieldDesc") return yieldPct(b.perkValueYen,b.needMoneyPerkYen) - yieldPct(a.perkValueYen,a.needMoneyPerkYen);
        if (state.sort === "monthAsc") return monthOrder.indexOf(a.recordMonth) - monthOrder.indexOf(b.recordMonth);
        return 0;
      });
  };

  const renderMeta = (arr) => {
    const total = baseSet().length;
    elMeta.innerHTML = `
      <span class="pill">表示 <b>${arr.length}</b> / ${total}件</span>
      <span class="pill"><b>${tab === "under" ? "10万円未満" : "1株"}</b> を表示中</span>
    `;
  };

  const itemHTML = (x) => {
    const need = Number(x.needMoneyPerkYen || 0);
    const y = yieldPct(x.perkValueYen, x.needMoneyPerkYen);
    const toMoney = `./money.html?need=${encodeURIComponent(String(need))}&name=${encodeURIComponent(x.name || "")}&code=${encodeURIComponent(String(x.code || ""))}`;

    return `
      <details class="item">
        <summary>
          <div class="lines">
            <div class="l1">${escapeHTML(x.name)} (${escapeHTML(x.code)})</div>
            <div class="l2">必要資金： <span class="need">${yen(need)}</span></div>
            <div class="l3">優待：${escapeHTML(x.perk || "")}</div>
          </div>
          <div class="arrow">▶</div>
        </summary>

        <div class="detail">
          <div class="row">
            <span class="chip">権利月：${escapeHTML(x.recordMonth || "—")}</span>
            <span class="chip">カテゴリ：${escapeHTML(x.category || "—")}</span>
            <span class="chip">必要株数：${escapeHTML(x.minSharesForPerk ?? "—")}株</span>
          </div>

          <div class="small">
            1株目安：${yen(x.pricePerShareYen || 0)} /
            優待価値（目安）：${yen(x.perkValueYen || 0)} /
            利回り（目安）：${y ? y.toFixed(1) + "%" : "—"}
          </div>

          <div class="small">
            出典：<a href="${escapeHTML(x.sourceUrl || "#")}" target="_blank" rel="noopener">IR/TDnet/公式</a>
            / 最終確認日：${escapeHTML(x.lastChecked || "—")}
          </div>

          ${x.perkNotes ? `<div class="small">メモ：${escapeHTML(x.perkNotes)}</div>` : ""}

          <div class="ctaRow">
            <a class="cta" href="${escapeHTML(RAKUTEN_AFF)}" target="_blank" rel="noopener">楽天証券で口座開設</a>
            <a class="cta ghost" href="${toMoney}">固定費で資金を作る</a>
          </div>
        </div>
      </details>
    `;
  };

  const render = () => {
    const arr = filtered();
    renderMeta(arr);

    if (!arr.length) {
      elList.innerHTML = `<div class="empty">該当なし。検索を消すか、絞り込み（権利月/カテゴリ）をリセットしてみて。</div>`;
      return;
    }
    elList.innerHTML = arr.map(itemHTML).join("");
  };

  // UI events
  document.getElementById("q").addEventListener("input", (e) => { state.q = e.target.value; render(); });
  document.getElementById("month").addEventListener("input", (e) => { state.month = e.target.value; render(); });
  document.getElementById("cat").addEventListener("input", (e) => { state.cat = e.target.value; render(); });
  document.getElementById("sort").addEventListener("input", (e) => { state.sort = e.target.value; render(); });

  const setTab = (next) => {
    tab = next;
    document.getElementById("tabUnder").classList.toggle("active", tab === "under");
    document.getElementById("tabOne").classList.toggle("active", tab === "one");
    rebuildCatOptions();
    render();
    window.scrollTo({top:0, behavior:"smooth"});
  };
  document.getElementById("tabUnder").addEventListener("click", () => setTab("under"));
  document.getElementById("tabOne").addEventListener("click", () => setTab("one"));

  // filters toggle (button controls details)
  const filters = document.getElementById("filters");
  const filterBtn = document.getElementById("filterBtn");
  const closeFilters = document.getElementById("closeFilters");
  filterBtn.addEventListener("click", () => {
    filters.style.display = "block";
    filters.open = !filters.open;
  });
  closeFilters.addEventListener("click", () => { filters.open = false; });

  document.getElementById("reset").addEventListener("click", () => {
    state.month = ""; state.cat = ""; state.sort = "needAsc";
    document.getElementById("month").value = "";
    document.getElementById("sort").value = "needAsc";
    rebuildCatOptions();
    render();
  });

  // Load data
  fetch(DATA_URL, { cache: "no-store" })
    .then(r => {
      if (!r.ok) throw new Error(`data.json が見つかりません（${r.status}）。URL: ${DATA_URL}`);
      return r.json();
    })
    .then(d => {
      DATA = Array.isArray(d) ? d : [];
      rebuildCatOptions();
      render();
    })
    .catch(err => {
      elErr.style.display = "block";
      elErr.innerHTML = `
        <b>エラー</b><br>
        ${escapeHTML(err?.message || err)}<br>
        <span style="color:var(--muted)">確認: ブラウザで <a href="${escapeHTML(DATA_URL)}" target="_blank" rel="noopener">${escapeHTML(DATA_URL)}</a> を開いてJSONが表示されるか</span>
      `;
    });

})();
</script>
</body>
</html>
