<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ミニ株で楽しむ株主優待</title>
  <meta name="description" content="今月の優待 / 10万円未満 / 1株優待。縦リスト+アコーディオン。絞り込みは収納。" />
  <style>
    :root{
      --bg:#f6f7f9;
      --card:#fff;
      --line:#e5e7eb;
      --text:#111;
      --muted:#6b7280;
      --shadow:0 1px 0 rgba(0,0,0,.03);
      --r:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;
      padding-bottom:56px; /* 下固定バー分（薄め） */
    }
    a{color:inherit}
    header{
      background:var(--card);
      border-bottom:1px solid var(--line);
      position:sticky;top:0;z-index:10;
    }
    .wrap{max-width:980px;margin:0 auto;padding:14px 14px}
    .topRow{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .titleBox b{display:block;font-size:16px}
    .titleBox .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .note{font-size:12px;color:var(--muted);margin-top:6px}

    .btn{
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      white-space:nowrap;
      font-weight:900;
      font-size:13px;
    }
    .btn.primary{background:#111;color:#fff;border-color:#111}

    /* tabs */
    .tabs{display:flex;gap:10px;margin-top:12px}
    .tab{
      flex:1;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:12px 10px;
      font-weight:950;
      cursor:pointer;
      font-size:13px;
    }
    .tab.active{background:#111;color:#fff;border-color:#111}

    /* meta */
    .metaRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--muted)}
    .pill{display:inline-flex;gap:6px;align-items:center;background:#eef2ff;border-radius:999px;padding:3px 10px}
    .pill b{color:#111}

    /* filters (収納) */
    details.filters{
      margin-top:10px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:10px;
    }
    .sr-only{
      position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
      clip:rect(0,0,0,0);white-space:nowrap;border:0;
    }
    .filterGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media (max-width:620px){ .filterGrid{grid-template-columns:1fr} }
    select{
      width:100%;
      padding:12px 12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
    }
    .filterActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}

    /* list (サイゼ式縦リスト) */
    .listBox{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    details.item{border-bottom:1px solid var(--line)}
    details.item:last-child{border-bottom:none}
    summary{
      list-style:none;
      cursor:pointer;
      padding:14px 14px;
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px;
      align-items:center;
    }
    summary::-webkit-details-marker{display:none}
    .lines{min-width:0}

    /* 銘柄名行：右端に権利月ミニ(3・9) */
    .l1{
      font-weight:950;
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      min-width:0;
    }
    .l1 .name{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .l1 .monthTag{
      flex:0 0 auto;
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      letter-spacing:.02em;
    }

    .l2{margin-top:6px;font-size:12px;color:var(--muted)}
    .need{font-size:20px;font-weight:950;color:#111}
    .l3{
      margin-top:6px;font-size:12px;color:var(--muted);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis
    }
    .arrow{
      font-weight:950;color:#111;
      border:1px solid var(--line);
      width:34px;height:34px;border-radius:999px;
      display:flex;align-items:center;justify-content:center;
      background:#fff;
      user-select:none;
    }
    details[open] .arrow{transform:rotate(90deg)}
    .detail{padding:0 14px 14px 14px}
    .detail .row{display:flex;gap:10px;flex-wrap:wrap}
    .chip{
      display:inline-flex;align-items:center;gap:6px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:3px 10px;
      font-size:12px;background:#fff;color:#111
    }
    .detail .small{margin-top:10px;font-size:12px;color:var(--muted);line-height:1.6}
    .ctaRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .cta{
      display:inline-block;
      padding:12px 14px;
      border-radius:14px;
      background:#111;color:#fff;
      text-decoration:none;font-weight:950;
    }
    .cta.ghost{background:#fff;color:#111;border:1px solid #111}
    .empty{padding:14px;color:var(--muted);font-size:12px}
    .err{
      margin:12px 0;
      border:1px solid #fecaca;background:#fff1f2;color:#7f1d1d;
      border-radius:14px;padding:12px 12px;font-size:12px;
    }

    /* legal fold */
    details.legal{
      margin-top:14px;
      border:1px solid var(--line);
      border-radius:14px;background:#fff;padding:10px;
      color:var(--muted);font-size:12px;line-height:1.7;
    }
    details.legal summary{padding:6px 6px;font-weight:950;color:#111}

    /* bottom bar (薄め) */
    .bottomBar{
      position:fixed;left:0;right:0;bottom:0;z-index:30;
      background:#fff;border-top:1px solid var(--line);
      padding:6px 10px;
    }
    .bottomInner{max-width:980px;margin:0 auto;display:flex;gap:10px}
    .bottomInner a{
      flex:1;text-align:center;text-decoration:none;
      padding:10px 10px;
      border-radius:12px;
      font-weight:950;
      font-size:13px;
      border:1px solid var(--line);
      background:#fff;
    }
    .bottomInner a.primary{background:#111;color:#fff;border-color:#111}
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <div class="topRow">
      <div class="titleBox">
        <b>ミニ株で楽しむ株主優待</b>
        <div class="sub">まずは「今月 / 10万円未満 / 1株」から選ぶだけ</div>
      </div>
      <button id="filterBtn" class="btn">絞り込み</button>
    </div>

    <div class="note">※プロモーション（広告）を含みます</div>

    <div class="tabs">
      <button id="tabMonth" class="tab active">今月の優待</button>
      <button id="tabUnder" class="tab" style="display:none;">10万円未満</button>
      <button id="tabOne" class="tab">1株優待</button>
    </div>

    <details id="filters" class="filters" style="display:none;">
      <summary class="sr-only">絞り込み</summary>

      <div class="filterGrid">
        <div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">権利月</div>
          <select id="month">
            <option value="">すべて</option>
            <option>1月</option><option>2月</option><option>3月</option><option>4月</option><option>5月</option><option>6月</option>
            <option>7月</option><option>8月</option><option>9月</option><option>10月</option><option>11月</option><option>12月</option>
          </select>
        </div>

        <div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">カテゴリ</div>
          <select id="cat">
            <option value="">すべて</option>
          </select>
        </div>

        <div style="grid-column:1/-1;">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">並び替え</div>
          <select id="sort">
            <option value="priceAsc">株価が安い順</option>
            <option value="monthAsc">権利月順</option>
          </select>
        </div>
      </div>

      <div class="filterActions">
        <button id="reset" class="btn">リセット</button>
        <button id="closeFilters" class="btn primary">閉じる</button>
      </div>
    </details>

    <div id="meta" class="metaRow"></div>
    <div id="err" class="err" style="display:none;"></div>
  </div>
</header>

<div class="wrap">
  <div class="listBox" id="listBox">
    <div id="list"></div>
  </div>

  <details class="legal">
    <summary>免責・広告について</summary>
    <div style="padding:6px 6px 10px 6px;">
      <div>・本サイトは情報提供のみ（投資助言ではありません）。</div>
      <div>・優待内容、必要株数、条件、価格は変更/変動します。必ず出典（IR/TDnet/公式）で最終確認してください。</div>
      <div>・当ページはプロモーション（広告）を含み、リンク経由で成果が発生すると報酬を得る場合があります。</div>
    </div>
  </details>
</div>

<!-- 下固定バー -->
<div class="bottomBar">
  <div class="bottomInner">
    <a class="primary" href="./index.html">優待を探す</a>
    <a href="./money.html">資金を作る（固定費）</a>
  </div>
</div>

<script>
(() => {
  // ====== ここだけ本物に差し替え ======
  const RAKUTEN_AFF = "https://YOUR-RAKUTEN-AFF-LINK";
  // =====================================

  const DATA_URL = new URL("data.json", location.href).toString();

  const elErr = document.getElementById("err");
  const elMeta = document.getElementById("meta");
  const elList = document.getElementById("list");
  const elCat = document.getElementById("cat");

  const monthOrder = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

  // “今月”を日本時間で固定
  const currentMonthLabel =
    new Intl.DateTimeFormat("ja-JP", { month: "numeric", timeZone: "Asia/Tokyo" }).format(new Date()) + "月";
  document.getElementById("tabMonth").textContent = `今月の優待`;

  // recordMonthが「3月」「3月/9月」「3月・9月」みたいでも対応
  const toHalfWidthDigits = (s) =>
  String(s || "").replace(/[０-９]/g, (d) => String.fromCharCode(d.charCodeAt(0) - 0xFEE0));

const extractMonths = (s) => {
  const t = toHalfWidthDigits(s);
  const m = t.match(/0?(?:1[0-2]|[1-9])月/g); // 3月 / 03月 どっちも拾う
  if (!m) return [];
  // 03月 → 3月 に正規化してユニーク化
  const normalized = m.map(x => x.replace(/^0/, ""));
  return [...new Set(normalized)];
};

  // 表示用：mini=true なら "3・9" / false なら "3月・9月"
  const formatRecordMonths = (s, mini = false) => {
    const ms = extractMonths(s);
    if (ms.length) {
      return mini
        ? ms.map(m => m.replace("月", "")).join("・")  // 3・9
        : ms.join("・");                              // 3月・9月
    }
    return s ? String(s).trim() : "—";
  };

  const hasMonth = (recordMonth, monthLabel) => extractMonths(recordMonth).includes(monthLabel);

  const firstMonthIndex = (recordMonth) => {
    const ms = extractMonths(recordMonth);
    if (!ms.length) return 999;
    const idxs = ms.map(x => monthOrder.indexOf(x)).filter(i => i >= 0);
    return idxs.length ? Math.min(...idxs) : 999;
  };

  let DATA = [];
  let tab = "month"; // "month" / "under" / "one"

  const state = {
    month: "",
    cat: "",
    sort: "priceAsc"
  };

  const yen = (n) => (Number(n || 0)).toLocaleString("ja-JP") + "円";

  const escapeHTML = (s) => String(s ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");

  const isOneOrUnder = (x) =>
    Number(x.minSharesForPerk) === 1 ||
    (Number(x.minSharesForPerk) >= 100 && Number(x.needMoneyPerkYen) <= 100000);

  const monthEl = document.getElementById("month");

  const syncMonthUI = () => {
    if (tab === "month") {
      // 今月タブでは月選択は固定（混乱防止）
      state.month = "";
      monthEl.value = currentMonthLabel;
      monthEl.disabled = true;
    } else {
      monthEl.disabled = false;
      monthEl.value = state.month;
    }
  };

  const baseSet = () => {
    if (tab === "one") {
      return DATA.filter(x => Number(x.minSharesForPerk) === 1);
    }
    if (tab === "under") {
      return DATA.filter(x => Number(x.minSharesForPerk) >= 100 && Number(x.needMoneyPerkYen) <= 100000);
    }
    // tab === "month"：今月の優待（1株＋10万円未満の両方）
    return DATA
      .filter(x => hasMonth(x.recordMonth, currentMonthLabel))
      .filter(isOneOrUnder);
  };

  const rebuildCatOptions = () => {
    const cats = [...new Set(baseSet().map(x => x.category).filter(Boolean))].sort();
    const current = state.cat;

    elCat.innerHTML = `<option value="">すべて</option>` + cats
      .map(c => `<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`)
      .join("");

    if (current && cats.includes(current)) {
      elCat.value = current;
    } else {
      state.cat = "";
      elCat.value = "";
    }
  };

  const filtered = () => {
    return baseSet()
      .filter(x => {
        const hitM = !state.month || hasMonth(x.recordMonth, state.month);
        const hitC = !state.cat || x.category === state.cat;
        return hitM && hitC;
      })
      .sort((a,b) => {
        if (state.sort === "priceAsc") {
          const ap = Number(a.pricePerShareYen ?? Infinity);
          const bp = Number(b.pricePerShareYen ?? Infinity);
          if (ap !== bp) return ap - bp;
          // tie-break: 月→必要資金
          return firstMonthIndex(a.recordMonth) - firstMonthIndex(b.recordMonth) ||
                 Number(a.needMoneyPerkYen ?? Infinity) - Number(b.needMoneyPerkYen ?? Infinity);
        }
        if (state.sort === "monthAsc") {
          const am = firstMonthIndex(a.recordMonth);
          const bm = firstMonthIndex(b.recordMonth);
          if (am !== bm) return am - bm;
          // tie-break: 株価→必要資金
          return Number(a.pricePerShareYen ?? Infinity) - Number(b.pricePerShareYen ?? Infinity) ||
                 Number(a.needMoneyPerkYen ?? Infinity) - Number(b.needMoneyPerkYen ?? Infinity);
        }
        return 0;
      });
  };

  const tabLabel = () => {
    if (tab === "month") return `今月の優待`;
    if (tab === "under") return "10万円未満";
    return "1株優待";
  };

  const renderMeta = (arr) => {
    const total = baseSet().length;
    elMeta.innerHTML = `
      <span class="pill">表示 <b>${arr.length}</b> / ${total}件</span>
      <span class="pill"><b>${escapeHTML(tabLabel())}</b> を表示中</span>
      <span class="pill">並び <b>${state.sort === "priceAsc" ? "株価安い順" : "権利月順"}</b></span>
    `;
  };

  const itemHTML = (x) => {
    const minShares = Number(x.minSharesForPerk) || 1;

    const priceRaw = Number(x.pricePerShareYen);
    const priceOk = Number.isFinite(priceRaw) && priceRaw > 0;

    let needRaw = Number(x.needMoneyPerkYen);
    const needOk = Number.isFinite(needRaw) && needRaw > 0;

    if (!needOk && priceOk) {
      needRaw = priceRaw * Math.max(1, minShares);
    }

    const needText = (Number.isFinite(needRaw) && needRaw > 0) ? yen(needRaw) : "—";
    const priceText = priceOk ? yen(priceRaw) : "—";

    const perkValueRaw = Number(x.perkValueYen);
    const perkValueText = (Number.isFinite(perkValueRaw) && perkValueRaw > 0) ? yen(perkValueRaw) : "—";

    const needForLink = (Number.isFinite(needRaw) && needRaw > 0) ? needRaw : 0;
    const toMoney = `./money.html?need=${encodeURIComponent(String(needForLink))}&name=${encodeURIComponent(x.name || "")}&code=${encodeURIComponent(String(x.code || ""))}`;

    return `
      <details class="item">
        <summary>
          <div class="lines">
            <div class="l1">
              <span class="name">${escapeHTML(x.name)} (${escapeHTML(x.code)})</span>
              <span class="monthTag">${escapeHTML(formatRecordMonths(x.recordMonth, true))}</span>
            </div>
            <div class="l2">必要資金： <span class="need">${needText}</span></div>
            <div class="l3">優待：${escapeHTML(x.perk || "")}</div>
          </div>
          <div class="arrow">▶</div>
        </summary>

        <div class="detail">
          <div class="row">
            <span class="chip">コード：${escapeHTML(x.code || "—")}</span>
            <span class="chip">権利月：${escapeHTML(formatRecordMonths(x.recordMonth, true))}</span>
            <span class="chip">カテゴリ：${escapeHTML(x.category || "—")}</span>
            <span class="chip">必要株数：${escapeHTML(x.minSharesForPerk ?? "—")}株</span>
          </div>

          <div class="small">
            株価（1株目安）：${priceText} /
            優待価値（目安）：${perkValueText}
          </div>

          <div class="small">
            出典：<a href="${escapeHTML(x.sourceUrl || "#")}" target="_blank" rel="noopener">IR/TDnet/公式</a>
            / 最終確認日：${escapeHTML(x.lastChecked || "—")}
          </div>

          ${x.perkNotes ? `<div class="small">メモ：${escapeHTML(x.perkNotes)}</div>` : ""}

          <div class="ctaRow">
            <a class="cta" href="${escapeHTML(RAKUTEN_AFF)}" target="_blank" rel="noopener">楽天証券で口座開設</a>
            <a class="cta ghost" href="${toMoney}">固定費で資金を作る</a>
          </div>
        </div>
      </details>
    `;
  };

  const render = () => {
    const arr = filtered();
    renderMeta(arr);

    if (!arr.length) {
      elList.innerHTML = `<div class="empty">該当なし。絞り込みをリセットしてみて。</div>`;
      return;
    }
    elList.innerHTML = arr.map(itemHTML).join("");
  };

  const setTab = (next) => {
    tab = next;

    document.getElementById("tabMonth").classList.toggle("active", tab === "month");
    document.getElementById("tabUnder").classList.toggle("active", tab === "under");
    document.getElementById("tabOne").classList.toggle("active", tab === "one");

    syncMonthUI();
    rebuildCatOptions();
    render();
    window.scrollTo({top:0, behavior:"smooth"});
  };

  // tab events
  document.getElementById("tabMonth").addEventListener("click", () => setTab("month"));
  document.getElementById("tabUnder").addEventListener("click", () => setTab("under"));
  document.getElementById("tabOne").addEventListener("click", () => setTab("one"));

  // filter UI events
  monthEl.addEventListener("input", (e) => { state.month = e.target.value; render(); });
  document.getElementById("cat").addEventListener("input", (e) => { state.cat = e.target.value; render(); });
  document.getElementById("sort").addEventListener("input", (e) => { state.sort = e.target.value; render(); });

  // filters toggle
  const filters = document.getElementById("filters");
  document.getElementById("filterBtn").addEventListener("click", () => {
    filters.style.display = "block";
    filters.open = !filters.open;
  });
  document.getElementById("closeFilters").addEventListener("click", () => { filters.open = false; });

  document.getElementById("reset").addEventListener("click", () => {
    state.month = "";
    state.cat = "";
    state.sort = "priceAsc";

    document.getElementById("sort").value = "priceAsc";
    syncMonthUI();
    rebuildCatOptions();
    render();
  });

  // initial sync for month tab
  syncMonthUI();

  // Load data
  fetch(DATA_URL, { cache: "no-store" })
    .then(r => {
      if (!r.ok) throw new Error(`data.json が見つかりません（${r.status}）。URL: ${DATA_URL}`);
      return r.json();
    })
    .then(d => {
      DATA = Array.isArray(d) ? d : [];
      rebuildCatOptions();
      render();
    })
    .catch(err => {
      elErr.style.display = "block";
      elErr.innerHTML = `
        <b>エラー</b><br>
        ${escapeHTML(err?.message || err)}<br>
        <span style="color:var(--muted)">確認: <a href="${escapeHTML(DATA_URL)}" target="_blank" rel="noopener">${escapeHTML(DATA_URL)}</a> を開いてJSONが表示されるか</span>
      `;
    });

})();
</script>
</body>
</html>
