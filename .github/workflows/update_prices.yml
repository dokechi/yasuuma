name: Update stock prices

on:
  schedule:
    - cron: "20 7 * * 1-5" # 07:20 UTC = 16:20 JST
  workflow_dispatch:

concurrency:
  group: update-stock-prices
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update prices in data.json
        run: python scripts/update_prices.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: update prices"
          git pull --rebase
          git push
