<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>資金を作る（固定費：スマホ/保険）</title>
  <style>
    :root{ --bg:#f6f7f9; --card:#fff; --line:#e5e7eb; --text:#111; --muted:#6b7280; --shadow:0 1px 0 rgba(0,0,0,.03); }
    *{box-sizing:border-box}
    body{
      margin:0;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;
      padding-bottom:70px;
    }
    a{color:inherit}
    header{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
    .wrap{max-width:980px;margin:0 auto;padding:14px 14px}
    .topRow{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .titleBox b{display:block;font-size:16px}
    .titleBox .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .note{font-size:12px;color:var(--muted);margin-top:6px}

    .tabs{display:flex;gap:10px;margin-top:12px}
    .tab{
      flex:1;border:1px solid var(--line);background:#fff;border-radius:14px;
      padding:12px 10px;font-weight:950;cursor:pointer;
    }
    .tab.active{background:#111;color:#fff;border-color:#111}

    .pill{
      display:inline-flex;gap:6px;align-items:center;background:#eef2ff;border-radius:999px;padding:3px 10px;
      font-size:12px;color:#111
    }
    .card{
      background:#fff;border:1px solid var(--line);border-radius:16px;
      box-shadow:var(--shadow);padding:14px;margin-top:12px;
    }
    .card h3{margin:8px 0 6px 0}
    .muted{color:var(--muted);font-size:12px;line-height:1.7}
    .ctaRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .cta{
      display:inline-block;padding:12px 14px;border-radius:14px;background:#111;color:#fff;text-decoration:none;font-weight:950;
    }
    .cta.ghost{background:#fff;color:#111;border:1px solid #111}
    .listBox{
      background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:12px;
      box-shadow:var(--shadow);
    }
    details.item{border-bottom:1px solid var(--line)}
    details.item:last-child{border-bottom:none}
    summary{
      list-style:none;cursor:pointer;padding:14px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    summary::-webkit-details-marker{display:none}
    .arrow{
      font-weight:900;border:1px solid var(--line);
      width:34px;height:34px;border-radius:999px;display:flex;align-items:center;justify-content:center;
      background:#fff;
    }
    details[open] .arrow{transform:rotate(90deg)}
    .detail{padding:0 14px 14px 14px}

    details.fold{
      margin-top:12px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px;
      color:var(--muted);font-size:12px;line-height:1.7;
    }
    details.fold summary{padding:6px 6px;font-weight:950;color:#111}

    .choiceGrid{display:grid;gap:10px;margin-top:12px}
    .qBox{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}
    .qTitle{font-weight:950;font-size:14px}
    .qBtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .qBtn{
      appearance:none;border:1px solid var(--line);background:#fff;color:#111;border-radius:999px;
      padding:10px 12px;font-weight:950;cursor:pointer;
    }
    .qBtn.active{background:#111;color:#fff;border-color:#111}
    .strip{margin-top:12px;border:1px dashed var(--line);background:#fafafa;border-radius:14px;padding:12px}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .chip{
      display:inline-flex;align-items:center;border:1px solid var(--line);background:#fff;border-radius:999px;
      padding:5px 10px;font-size:12px;font-weight:700;
    }
    .goalBox{margin-top:10px;padding:10px 12px;border-radius:14px;background:#f9fafb;border:1px solid var(--line)}

    .bottomBar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);padding:10px 12px}
    .bottomInner{max-width:980px;margin:0 auto;display:flex;gap:10px}
    .bottomInner a{
      flex:1;text-align:center;text-decoration:none;padding:12px 12px;border-radius:14px;font-weight:950;
      border:1px solid var(--line);background:#fff;
    }
    .bottomInner a.primary{background:#111;color:#fff;border-color:#111}

    .err{
      margin-top:12px;border:1px solid #fecaca;background:#fff1f2;color:#7f1d1d;
      border-radius:14px;padding:12px 12px;font-size:12px;
    }
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="topRow">
      <div class="titleBox">
        <b>資金を作る（固定費）</b>
        <div class="sub">まずは「スマホ」か「保険」から選ぶだけ</div>
      </div>
    </div>
    <div class="note">※プロモーション（広告）を含みます</div>

    <div class="tabs">
      <button id="tabPhone" class="tab active">① 携帯料金を下げる</button>
      <button id="tabIns" class="tab">② 保険料を下げる</button>
    </div>

    <div id="target" style="margin-top:10px;display:none;">
      <span class="pill">目標</span>
      <span class="muted" id="targetText" style="margin-left:8px;"></span>
    </div>

    <div id="err" class="err" style="display:none;"></div>
  </div>
</header>

<div class="wrap">
  <div class="card" id="decision"></div>
  <div class="card" id="recommend"></div>

  <div class="muted" style="margin-top:12px;font-weight:900;color:#111;">比較（他の候補）</div>
  <div class="listBox" id="others"></div>

  <details class="fold">
    <summary>筆者の設定（公開）</summary>
    <div id="authorContent" style="padding:6px 6px 10px 6px;"></div>
  </details>

  <details class="fold">
    <summary>免責・広告について</summary>
    <div style="padding:6px 6px 10px 6px;">
      <div>・本ページは情報提供のみです。</div>
      <div>・料金や条件は必ず各サービスの公式で確認してください。</div>
      <div>・当ページはプロモーション（広告）を含み、リンク経由で成果が発生すると報酬を得る場合があります。</div>
    </div>
  </details>
</div>

<div class="bottomBar">
  <div class="bottomInner">
    <a href="./index.html">優待を探す</a>
    <a class="primary" href="./money.html">資金を作る（固定費）</a>
  </div>
</div>

<script>
(() => {
  const MONEY_URL = new URL("money.json", location.href).toString();

  const elErr = document.getElementById("err");
  const elDecision = document.getElementById("decision");
  const elRecommend = document.getElementById("recommend");
  const elOthers = document.getElementById("others");
  const elAuthorContent = document.getElementById("authorContent");

  const params = new URLSearchParams(location.search);
  const need = Number(params.get("need") || 0);
  const name = params.get("name") || "";
  const code = params.get("code") || "";

  const elTarget = document.getElementById("target");
  const elTargetText = document.getElementById("targetText");
  if (need > 0) {
    elTarget.style.display = "block";
    elTargetText.textContent = `${name}${code ? " ("+code+")" : ""} / 必要資金（目安）：${need.toLocaleString("ja-JP")}円`;
  }

  let OFFERS = [];
  let tab = "phone";
  const phoneState = { data: "over20", fps: "no", priority: "budget" };

  const escapeHTML = (s) => String(s ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");

  const yen = (n) => (Number(n||0)).toLocaleString("ja-JP") + "円";

  const monthText = (min, max) => {
    if (!(need > 0) || !(min > 0) || !(max > 0)) return "";
    const fast = Math.max(1, Math.ceil(need / Math.max(min, max)));
    const slow = Math.max(1, Math.ceil(need / Math.min(min, max)));
    return `この節約を続けると、目標 ${need.toLocaleString("ja-JP")}円 まで約 ${fast}〜${slow}か月`;
  };

  const phoneReasons = () => {
    const arr = [];
    arr.push(phoneState.data === "over20" ? "20GB以上" : "20GB未満");
    arr.push(phoneState.fps === "yes" ? "反応速度重視" : "動画中心");
    arr.push(phoneState.priority === "stable" ? "安定優先" : "安さ優先");
    return arr;
  };

  const phoneOrder = () => {
    if (phoneState.fps === "yes") return ["ahamo", "linemo", "rakuten", "povo"];
    if (phoneState.priority === "stable") return ["ahamo", "linemo", "rakuten", "povo"];
    if (phoneState.data === "over20") return ["rakuten", "ahamo", "linemo", "povo"];
    return ["linemo", "povo", "ahamo", "rakuten"];
  };

  const pick = () => {
    const cat = (tab === "phone") ? "スマホ" : "保険";
    const arr = OFFERS.filter(o => o.category === cat);

    if (tab !== "phone") {
      const rec = arr[0] || null;
      const others = arr.slice(1, 4);
      return { cat, rec, others };
    }

    const byId = new Map(arr.map(o => [o.id, o]));
    const ordered = [];
    for (const id of phoneOrder()) {
      if (byId.has(id)) ordered.push(byId.get(id));
    }
    for (const item of arr) {
      if (!ordered.find(o => o.id === item.id)) ordered.push(item);
    }

    return {
      cat,
      rec: ordered[0] || null,
      others: ordered.slice(1, 4)
    };
  };

  const renderDecision = () => {
    if (tab !== "phone") {
      elDecision.style.display = "none";
      return;
    }

    elDecision.style.display = "block";
    const q = (key, title, a, b) => `
      <div class="qBox">
        <div class="qTitle">${title}</div>
        <div class="qBtns">
          <button class="qBtn ${phoneState[key] === a.value ? "active" : ""}" data-q="${key}" data-v="${a.value}">${a.label}</button>
          <button class="qBtn ${phoneState[key] === b.value ? "active" : ""}" data-q="${key}" data-v="${b.value}">${b.label}</button>
        </div>
      </div>
    `;

    elDecision.innerHTML = `
      <span class="pill">3問で決める</span>
      <h3>スマホは、まずここだけ</h3>
      <div class="muted">※初期値はサンプルです。3つだけ変えると、おすすめが切り替わります。</div>

      <div class="choiceGrid">
        ${q("data", "1. 月20GB以上使う？", { value: "over20", label: "20GB以上" }, { value: "under20", label: "20GB未満" })}
        ${q("fps", "2. FPSなど“反応速度が命”の使い方をする？", { value: "yes", label: "する" }, { value: "no", label: "しない" })}
        ${q("priority", "3. 最優先はどっち？", { value: "stable", label: "安定" }, { value: "budget", label: "安さ" })}
      </div>

      <div class="strip">
        <div style="font-weight:950;">いまの判定軸</div>
        <div class="chips">
          ${phoneReasons().map(r => `<span class="chip">${escapeHTML(r)}</span>`).join("")}
        </div>
      </div>
    `;
  };

const renderAuthor = () => {
  if (tab === "phone") {
    elAuthorContent.innerHTML = `
      <div>・利用キャリア：楽天モバイル</div>
      <div style="margin-top:8px;">・私の考え方</div>
      <div>　- まず最優先なのは、高いスマホ料金を下げること。</div>
      <div>　- その時に手続きや確認が面倒だと、人は途中で止まりやすい。</div>
      <div>　- だから最初は「安さを極める」より、「実行しやすいこと」を重視する。</div>

      <div style="margin-top:8px;">・楽天モバイルを選んでいる理由</div>
      <div>　- 全国に窓口があるので、万が一の時に動きやすい。</div>
      <div>　- 店舗があるので、万が一のときに相談しやすい。</div>
      <div>　- テザリングが無料なので、自宅Wi-Fi込みで見ても安くしやすい。</div>
      <div>　- Netflix、YouTube、ネットサーフィン程度なら十分使いやすい。</div>
      <div>　- 各社の通信プランはかなり見ているが、それでも毎月200GB使って3,300円台なら安いと考えて楽天にしている。</div>

      <div style="margin-top:8px;">・補足</div>
      <div>　- もっと安い会社を突き詰めることもできるが、それは慣れてからでも遅くない。</div>
      <div>　- まずは「高い固定費を確実に下げる」ことを優先している。</div>
    `;
    return;
  }

  elAuthorContent.innerHTML = `
    <div>・固定費の見直し方針（例）</div>
    <div>　- 保険：保障の過不足を整理して、必要なものだけ残す</div>
  `;
};

  const render = () => {
    const { cat, rec, others } = pick();

    document.getElementById("tabPhone").classList.toggle("active", tab === "phone");
    document.getElementById("tabIns").classList.toggle("active", tab === "ins");

    renderDecision();
    renderAuthor();

    if (!rec) {
      elRecommend.innerHTML = `<div class="muted">このカテゴリのデータがまだありません（money.jsonを確認）。</div>`;
      elOthers.innerHTML = `<div class="muted" style="padding:14px;">—</div>`;
      return;
    }

    const goalHtml = monthText(rec.monthlySaveMin, rec.monthlySaveMax)
      ? `<div class="goalBox"><div class="muted">${escapeHTML(monthText(rec.monthlySaveMin, rec.monthlySaveMax))}</div></div>`
      : "";

    const reasonHtml = (tab === "phone")
      ? `<div class="chips">${phoneReasons().map(r => `<span class="chip">${escapeHTML(r)}</span>`).join("")}</div>`
      : "";

    elRecommend.innerHTML = `
      <span class="pill">${escapeHTML(cat)}</span>
      <h3>結論：${escapeHTML(rec.title)} が合いやすい</h3>
      ${reasonHtml}
      ${rec.fitLabel ? `<div class="muted" style="margin-top:10px;">向く人：${escapeHTML(rec.fitLabel)}</div>` : ""}
      <div class="muted" style="margin-top:8px;">${escapeHTML(rec.desc || "")}</div>

      <div class="muted" style="margin-top:10px;">
        節約目安：<b>月 ${yen(rec.monthlySaveMin)}〜${yen(rec.monthlySaveMax)}</b>
      </div>

      ${goalHtml}

      <details class="fold" style="margin-top:10px;">
        <summary>やること（手順）</summary>
        <div style="padding:6px 6px 10px 18px;">
          <ol class="muted" style="margin:8px 0 0 0;padding-left:18px;">
            ${(rec.steps || []).map(s => `<li>${escapeHTML(s)}</li>`).join("")}
          </ol>
        </div>
      </details>

      <div class="ctaRow">
        <a class="cta" href="${escapeHTML(rec.affUrl)}" target="_blank" rel="noopener">${escapeHTML(rec.ctaLabel || "比較/申込へ")}</a>
        <a class="cta ghost" href="./index.html">優待に戻る</a>
      </div>

      ${rec.note ? `<div class="muted" style="margin-top:8px;">${escapeHTML(rec.note)}</div>` : ""}
    `;

    if (!others.length) {
      elOthers.innerHTML = `<div class="muted" style="padding:14px;">比較候補はまだ少ない（追加すると強くなる）</div>`;
      return;
    }

    elOthers.innerHTML = others.map(o => `
      <details class="item">
        <summary>
          <div>
            <div style="font-weight:950;">${escapeHTML(o.title)}</div>
            <div class="muted">${o.fitLabel ? `向く人：${escapeHTML(o.fitLabel)} / ` : ""}節約目安：月 ${yen(o.monthlySaveMin)}〜${yen(o.monthlySaveMax)}</div>
          </div>
          <div class="arrow">▶</div>
        </summary>
        <div class="detail">
          <div class="muted">${escapeHTML(o.desc || "")}</div>
          <div class="ctaRow" style="margin-top:10px;">
            <a class="cta" href="${escapeHTML(o.affUrl)}" target="_blank" rel="noopener">${escapeHTML(o.ctaLabel || "比較/申込へ")}</a>
          </div>
          ${o.note ? `<div class="muted" style="margin-top:8px;">${escapeHTML(o.note)}</div>` : ""}
        </div>
      </details>
    `).join("");
  };

  elDecision.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-q][data-v]");
    if (!btn) return;
    phoneState[btn.dataset.q] = btn.dataset.v;
    render();
  });

  document.getElementById("tabPhone").addEventListener("click", () => {
    tab = "phone";
    render();
    window.scrollTo({top:0, behavior:"smooth"});
  });

  document.getElementById("tabIns").addEventListener("click", () => {
    tab = "ins";
    render();
    window.scrollTo({top:0, behavior:"smooth"});
  });

  fetch(MONEY_URL, { cache: "no-store" })
    .then(r => {
      if (!r.ok) throw new Error(`money.json が見つかりません（${r.status}）。URL: ${MONEY_URL}`);
      return r.json();
    })
    .then(d => {
      OFFERS = Array.isArray(d) ? d : [];
      render();
    })
    .catch(err => {
      elErr.style.display = "block";
      elErr.innerHTML = `<b>エラー</b><br>${escapeHTML(err?.message || err)}<br>
      <span class="muted">確認: <a href="${escapeHTML(MONEY_URL)}" target="_blank" rel="noopener">${escapeHTML(MONEY_URL)}</a></span>`;
    });

})();
</script>
</body>
</html>
